# ============================================================
# Magnitude classification thresholds (Richter scale)
# ============================================================
magnitude_classes:
  micro:    { max: 2.0,  description: "Generalmente no sentido" }
  minor:    { min: 2.0,  max: 4.0,  description: "Sentido levemente" }
  light:    { min: 4.0,  max: 5.0,  description: "Daños menores posibles" }
  moderate: { min: 5.0,  max: 6.0,  description: "Daños a estructuras débiles" }
  strong:   { min: 6.0,  max: 7.0,  description: "Daños significativos" }
  major:    { min: 7.0,  max: 8.0,  description: "Daños graves en área amplia" }
  great:    { min: 8.0,  description: "Devastador, potencialmente global" }

# ============================================================
# Risk score weights (proprietary Atlas RA formula)
# ============================================================
risk_score:
  magnitude_weight: 0.40
  depth_weight: 0.25
  significance_weight: 0.20
  population_weight: 0.15
  max_depth_km: 700
  max_significance: 1000
  max_felt_reports: 100
  high_risk_threshold: 70          # Used in reports
