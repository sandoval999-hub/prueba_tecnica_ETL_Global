# ============================================================
# Seismic ETL Pipeline — Atlas Reinsurance Analytics
# Configuration file (no secrets here — see .env.example)
# ============================================================

api:
  base_url: "https://earthquake.usgs.gov/fdsnws/event/1/query"
  rate_limit_seconds: 1.0          # Sleep between consecutive API requests
  request_timeout_seconds: 30      # HTTP request timeout
  max_retries: 3                   # Max retry attempts on 5xx / timeout
  retry_backoff_seconds: 2         # Initial backoff; doubles each retry (2 → 4 → 8)
  max_segment_days: 30             # Max days per API segment in historical mode
  result_limit: 20000              # USGS max results per request

circuit_breaker:
  failure_threshold: 3             # Consecutive failures before opening the circuit
  state_file: "logs/circuit_breaker_state.json"

pipeline:
  batch_size: 200                  # Records per INSERT batch
  daily_lookback_hours: 24         # Hours to look back in daily mode
  alert_lookback_hours: 1          # Hours to look back in alert mode
  daily_min_magnitude: 1.0
  alert_min_magnitude: 4.5
  historical_min_magnitude: 2.5

database:
  pool_size: 5                     # SQLAlchemy connection pool size
  max_overflow: 10                 # Extra connections above pool_size
  pool_timeout: 30                 # Seconds to wait for a connection from the pool
  pool_recycle: 3600               # Recycle connections after N seconds (avoids stale conn in MySQL)

logging:
  level: "INFO"
  log_dir: "logs"
  log_file: "pipeline.log"
  max_bytes: 10485760              # 10 MB per log file
  backup_count: 5

output:
  report_dir: "output"
  charts_dir: "output/charts"

# ============================================================
