name: Seismic ETL CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: atlas2025
          MYSQL_DATABASE: seismic_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: "3.9"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install ruff pytest-cov
        
    - name: Lint with Ruff
      run: |
        # Parar el build si hay errores de sintaxis
        ruff check src/ tests/ main.py health_check.py --output-format=github
        
    - name: Initialize Database (Migrations)
      run: |
        # Inicializa la estructura en el contenedor de MySQL de Actions
        mysql -h 127.0.0.1 -u root -patlas2025 seismic_db < sql/migrations/V1__init_schema.sql
        mysql -h 127.0.0.1 -u root -patlas2025 seismic_db < sql/migrations/V2__add_quarantine_table.sql
        
    - name: Run Tests with pytest
      run: |
        # Correr todos los tests unitarios con reporte de covertura
        pytest tests/ -v --cov=src --cov-report=xml
        
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v3
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
